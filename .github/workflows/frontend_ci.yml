name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/frontend_ci.yml"
      - "src/**"
      - "index.html"
      - "package.json"
      - "bun.lockb"
      - "tsconfig*.json"
      - "vite.config.*"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/frontend_ci.yml"
      - "src/**"
      - "index.html"
      - "package.json"
      - "bun.lockb"
      - "tsconfig*.json"
      - "vite.config.*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend
        run: bun run build
