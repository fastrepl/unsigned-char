name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create GitHub release and upload bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "unsigned {char} v__VERSION__"
          releaseBody: "See release notes for details and download assets below."
          releaseDraft: false
          prerelease: false
          args: --target aarch64-apple-darwin

      - name: Generate updater manifest
        run: node scripts/build-updater-manifest.mjs "${GITHUB_REF_NAME#v}"

      - name: Upload updater assets and manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          archive="$(find src-tauri/target/aarch64-apple-darwin/release/bundle/macos -maxdepth 1 -name '*.app.tar.gz' | head -n 1)"
          signature="${archive}.sig"
          cp "$archive" unsigned-char-aarch64.app.tar.gz
          cp "$signature" unsigned-char-aarch64.app.tar.gz.sig
          gh release upload "$GITHUB_REF_NAME" \
            unsigned-char-aarch64.app.tar.gz \
            unsigned-char-aarch64.app.tar.gz.sig \
            latest.json \
            --clobber
